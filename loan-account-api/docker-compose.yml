services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  loan-account-api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      APP_REDIS_HOST: redis
      APP_REDIS_PORT: "6379"
      APP_INTERNAL_API_KEY: dev-internal-key
      APP_LOGGING_DEFAULT_STRATEGY: db
      APP_LOGGING_FILE_DIRECTORY: /app/logs
    volumes:
      - ./logs:/app/logs

volumes:
  redis-data:
