server.port=${APP_SERVER_PORT:8080}

management.endpoints.web.exposure.include=health,info

app.server.port=${server.port}

app.executors.loan.pool-size=${APP_EXECUTORS_LOAN_POOL_SIZE:10}
app.executors.loan.queue-capacity=${APP_EXECUTORS_LOAN_QUEUE_CAPACITY:50}
app.executors.account.pool-size=${APP_EXECUTORS_ACCOUNT_POOL_SIZE:10}
app.executors.account.queue-capacity=${APP_EXECUTORS_ACCOUNT_QUEUE_CAPACITY:50}
app.executors.internal.pool-size=${APP_EXECUTORS_INTERNAL_POOL_SIZE:4}
app.executors.internal.queue-capacity=${APP_EXECUTORS_INTERNAL_QUEUE_CAPACITY:20}

app.logging.default-strategy=${APP_LOGGING_DEFAULT_STRATEGY:db}
app.logging.file-directory=${APP_LOGGING_FILE_DIRECTORY:logs}
app.logging.db.max-entries=${APP_LOGGING_DB_MAX_ENTRIES:10000}

app.internal.api-key=${APP_INTERNAL_API_KEY:}

app.third-party.loan.url=${APP_THIRD_PARTY_LOAN_URL:http://localhost:${server.port}/third-party/loan}
app.loan.http.max-retries=${APP_LOAN_HTTP_MAX_RETRIES:2}
app.loan.cache-ttl-seconds=${APP_LOAN_CACHE_TTL_SECONDS:300}

app.circuit-breaker.loan.failure-threshold=${APP_CIRCUIT_BREAKER_LOAN_FAILURE_THRESHOLD:3}
app.circuit-breaker.loan.open-duration-millis=${APP_CIRCUIT_BREAKER_LOAN_OPEN_DURATION_MILLIS:30000}

app.redis.host=${APP_REDIS_HOST:localhost}
app.redis.port=${APP_REDIS_PORT:6379}
app.redis.timeout-millis=${APP_REDIS_TIMEOUT_MILLIS:2000}
